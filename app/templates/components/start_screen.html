<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gray-50" style="background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(10,90,10,0.03) 3px, rgba(10,90,10,0.03) 4px);">
    <div class="text-center max-w-sm">
        <h1 class="text-4xl font-bold text-gray-900 mb-2 uppercase tracking-widest hover-brighten">Soc Ops</h1>
        <p class="text-lg text-gray-600 mb-8 uppercase tracking-wide hover-brighten terminal-cursor">&gt; TERMINAL ACTIVE_</p>

        <div class="bg-white p-6 shadow-sm border border-gray-200 mb-8" style="border-style: dashed;">
            <h2 class="font-semibold text-gray-800 mb-3 uppercase tracking-wide hover-brighten">Protocol</h2>
            <ul class="text-left text-gray-600 text-sm space-y-2">
                <li class="hover-brighten">[01] Locate operatives matching each dossier</li>
                <li class="hover-brighten">[02] Tap to confirm visual contact</li>
                <li class="hover-brighten">[03] Complete a line to extract</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-4 px-8 rounded-lg text-lg active:bg-accent-light transition-colors uppercase tracking-widest hover-brighten">
            &gt; EXECUTE
        </button>

        <p class="text-gray-500 text-xs mt-4 tracking-wide hover-brighten">[ SESSION CLASSIFIED // EYES ONLY ]</p>
    </div>
</div>
</div>
