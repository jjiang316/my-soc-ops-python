<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full bg-gray-50">
    <div class="text-center max-w-sm p-6">
        <p class="text-xs uppercase tracking-widest hover-brighten mb-6 animate-start-reveal" style="animation-delay: 0.5s">soc-ops</p>

        <div class="animate-start-reveal mb-6" style="animation-delay: 1.2s">
            <hr class="divider-hairline">
        </div>

        <ul class="text-left text-sm space-y-2 mb-6 animate-start-reveal" style="animation-delay: 2.0s">
            <li class="hover-brighten">locate matching operatives</li>
            <li class="hover-brighten">tap to confirm contact</li>
            <li class="hover-brighten">complete a line</li>
        </ul>

        <div class="animate-start-reveal mb-8" style="animation-delay: 2.8s">
            <hr class="divider-hairline">
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="uppercase tracking-widest hover-brighten hover-underline animate-start-reveal"
            style="animation-delay: 4.2s;">
            initiate
        </button>
    </div>
</div>
</div>
