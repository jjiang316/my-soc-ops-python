<div id="game-container">
<div class="flex flex-col min-h-full bg-gray-50">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 bg-transparent">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-gray-500 text-sm px-3 py-1.5 hover-brighten uppercase tracking-wide">
            ‹ abort
        </button>
        <h1 class="font-bold text-gray-900 uppercase tracking-widest hover-brighten">soc ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-gray-500 text-sm py-2 px-4 hover-brighten">
        Confirm visual contact with matching operatives.
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-amber-100 text-amber-800 text-center py-2 font-semibold text-sm uppercase tracking-wide">
        ◆ LINE SECURED ◆
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
